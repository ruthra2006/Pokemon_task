<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Battle Arena</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            color: #000;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .controls {
            margin: 18px 0;
        }

        .controls input,
        .controls button {
            padding: 12px 16px;
            font-size: 1rem;
        }

        .controls input {
            width: 260px;
        }

        .battlefield {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .pokemon-box {
            flex: 1;
            min-width: 260px;
            padding: 18px;
            border: 1px solid #ccc;
            border-radius: 12px;
            text-align: center;
        }

        .pokemon-box img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pokemon Battle</h1>
            <p class="subtext">Enter your Pokemon name</p>
        </div>

        <div class="controls">
            <input id="pokemonInput" placeholder="Type a Pokemon name" />
            <button id="chooseBtn">Choose Pokemon</button>
        </div>

        <div class="battlefield">
            <div class="pokemon-box">
                <h2 id="leftName">Your Pokemon</h2>
                <img id="leftImg" src="" alt="Your Pokemon">
                <p id="leftMove">Attack: -</p>
            </div>

            <div class="pokemon-box">
                <h2 id="rightName">Computer Pokemon</h2>
                <img id="rightImg" src="" alt="Computer Pokemon">
                <p id="rightMove">Attack: -</p>
            </div>
        </div>

        <div class="result-bar">
            <h2 id="result">Ready for battle</h2>
        </div>
    </div>

    <script>
        const chooseBtn = document.getElementById('chooseBtn');
        const pokemonInput = document.getElementById('pokemonInput');
        const result = document.getElementById('result');

        chooseBtn.addEventListener('click', () => {
            const name = pokemonInput.value.trim().toLowerCase();
            if (!name) {
                result.textContent = 'Please enter a Pokémon name first.';
                return;
            }
            loadPlayerPokemon(name);
        });

        pokemonInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                chooseBtn.click();
            }
        });

        async function loadPlayerPokemon(name) {
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                if (!response.ok) {
                    throw new Error('Pokemon not found');
                }
                const data = await response.json();
                const playerMovePower = await fillPokemonCard('left', data);
                const computerResult = await loadComputerPokemon();
                showBattleResult(data, playerMovePower, computerResult.data, computerResult.movePower);
            } catch (error) {
                console.error(error);
                result.textContent = 'Could not find that Pokémon. Try another name.';
            }
        }

        async function loadComputerPokemon() {
            const randomId = Math.floor(Math.random() * 1020) + 1;
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
            const data = await response.json();
            const movePower = await fillPokemonCard('right', data);
            return { data, movePower };
        }

        async function fillPokemonCard(side, data) {
            const moveText = await getBestMove(data);
            const movePower = moveText.power || 0;

            document.getElementById(`${side}Name`).textContent = data.name.toUpperCase();
            document.getElementById(`${side}Img`).src = data.sprites.front_default;
            document.getElementById(`${side}Move`).textContent = `Attack: ${moveText.name}`;

            return movePower;
        }

        async function getBestMove(data) {
            const moves = data.moves.slice(0, 12);
            let bestMove = { name: 'Unknown move', power: 0 };

            for (const moveEntry of moves) {
                try {
                    const response = await fetch(moveEntry.move.url);
                    if (!response.ok) continue;
                    const moveData = await response.json();
                    if (moveData.power && moveData.power > bestMove.power) {
                        bestMove = {
                            name: moveData.name.replace(/-/g, ' '),
                            power: moveData.power
                        };
                    }
                } catch (error) {
                    console.error('Move fetch failed', error);
                }
            }

            if (bestMove.power > 0) {
                bestMove.name = `${bestMove.name} - ${bestMove.power}`;
                return bestMove;
            }

            const fallbackName = data.moves[0]?.move.name.replace(/-/g, ' ') || 'Unknown move';
            return { name: `${fallbackName} - 0`, power: 0 };
        }

        function showBattleResult(playerData, playerMovePower, computerData, computerMovePower) {
            if (playerMovePower > computerMovePower) {
                result.textContent = `You win! ${playerData.name.toUpperCase()}  beats ${computerData.name.toUpperCase()} .`;
            } else if (playerMovePower < computerMovePower) {
                result.textContent = `Computer wins! ${computerData.name.toUpperCase()}  beats ${playerData.name.toUpperCase()} .`;
            } else {
                result.textContent = `It's a tie! Both moves have equal damage.`;
            }
        }
    </script>
</body>
</html>
