<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="searchBox" placeholder="Type product name">
    <button onclick="searchProduct()">Search</button>

  <div id="result"></div>

  <script>
    async function searchProduct() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const resultDiv = document.getElementById("result");

      try {
        const response = await fetch("https://fakestoreapi.com/products");
        const products = await response.json();
        console.log(products);

        const product = products.find(p => p.title.toLowerCase().includes(query));

        if (product) {
          resultDiv.innerHTML = `
            <p><strong>ID:</strong> ${product.id}</p>
            <img src="${product.image}" alt="${product.title}" width="150">
          `;
        } else {
          resultDiv.innerHTML = "<p>No product found.</p>";
        }
      } catch (error) {
        resultDiv.innerHTML = "<p>Error fetching products.</p>";
      }
    }
  </script>
</body>
</html>
